# Emails a daily GA4 analytics summary. Runs on a schedule (and on demand). All
# credentials are GitHub Actions secrets — nothing sensitive is in the repo.
name: Daily analytics email

on:
  schedule:
    # 13:00 UTC ≈ 7–8am US Central. GA4 has fully processed "yesterday" by then.
    - cron: '0 13 * * *'
  workflow_dispatch: {} # lets you run it manually from the Actions tab to test

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send summary email
        run: node scripts/daily-analytics-email.mjs
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
